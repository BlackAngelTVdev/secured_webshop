<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Shop - Connexion</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <div id="topbar"></div>

    <main>
        <section class="hero auth-hero">
            <div class="container">
                <div class="auth-layout">
                    <div class="auth-intro">
                        <p class="eyebrow">Acces securise</p>
                        <h1>Connexion</h1>
                        <p class="hero-text">Connectez-vous pour retrouver votre profil et gerer vos informations en toute securite.</p>
                    </div>

                    <section class="auth-card" aria-label="Formulaire de connexion">
                        <h2>Bienvenue</h2>
                        <p class="auth-subtitle">Saisissez vos identifiants pour continuer.</p>

                        <div class="message" id="login-message" role="status" aria-live="polite"></div>

                        <form id="login-form" novalidate>
                            <div class="form-group">
                                <label for="email">Email</label>
                                <input type="email" id="email" name="email" placeholder="nom@exemple.ch" autocomplete="email" required>
                            </div>

                            <div class="form-group">
                                <label for="password">Mot de passe</label>
                                <input type="password" id="password" name="password" placeholder="Votre mot de passe" autocomplete="current-password" required>
                            </div>

                            <button type="submit" id="login-submit">Se connecter</button>
                        </form>

                        <p class="auth-meta">Pas encore de compte ? <a href="/register">Creer un compte</a></p>
                    </section>
                </div>
            </div>
        </section>
    </main>

    <footer id="contact" class="footer">
        <div class="container">
            <p>Projet pedagogique - ETML 183</p>
        </div>
    </footer>

    <script src="/js/nav.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/login.js"></script>
</body>
</html>
